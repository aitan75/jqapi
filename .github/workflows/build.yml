name: Build

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SONAR: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history improves SonarCloud blame data
          persist-credentials: false

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: SonarCloud analysis
        if: env.HAS_SONAR == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar

      - name: Cache OWASP dependency-check data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-

      - name: OWASP Dependency-Check (SCA)
        continue-on-error: true # non-blocking: report visibility without gating the merge
        # The shared dependency-check-data cache is kept warm by the scheduled
        # nvd-cache-warm workflow, so this should normally only need a fast
        # incremental update. Still capped in case NVD is degraded.
        timeout-minutes: 15
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning::NVD_API_KEY not set — NVD downloads are rate-limited, SCA report may be degraded"
          fi
          mvn -B org.owasp:dependency-check-maven:12.2.2:check \
            -DfailBuildOnCVSS=7 \
            -DfailOnError=true \
            ${NVD_API_KEY:+-DnvdApiKey=$NVD_API_KEY}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore
          retention-days: 30
