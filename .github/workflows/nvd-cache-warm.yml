name: NVD cache warm-up

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Restore/save OWASP dependency-check data cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-data-${{ github.run_id }}
          restore-keys: |
            dependency-check-data-

      - name: Update NVD data (no scan)
        continue-on-error: true # best-effort: a slow/degraded NVD sync must not fail this maintenance job
        timeout-minutes: 60 # generous — this run isn't gating any PR, it just advances the shared cache
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning::NVD_API_KEY not set — NVD downloads are rate-limited, cache warm-up will be slower"
          fi
          mvn -B org.owasp:dependency-check-maven:12.2.2:update-only \
            -DfailOnError=true \
            ${NVD_API_KEY:+-DnvdApiKey=$NVD_API_KEY}
